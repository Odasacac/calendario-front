<div class="login-container">
  <div class="login-card">

    <h1 class="title">Calendario para vivir en armonía con el universo</h1>

    <h2 class="subtitle">Log in</h2>

<form #loginForm="ngForm" (ngSubmit)="goHome(loginForm)">

  <label for="user">Usuario o email</label>
  <input id="user" name="user" type="text" placeholder="Introduce tu usuario o email"
         [(ngModel)]="user" required />
  <div class="error" *ngIf="loginForm.submitted && !user">
    Este campo es obligatorio
  </div>

  <label for="password">Contraseña</label>
  <input id="password" name="password" type="password" placeholder="Introduce tu contraseña"
         [(ngModel)]="password" required />
  <div class="error" *ngIf="loginForm.submitted && !password">
    Este campo es obligatorio
  </div>

  <button type="submit">Entrar</button>

</form>

    <p class="forgot-password" (click)="goRecovery()">He olvidado mi contraseña</p>
    <p class="switch" (click)="goRegister()">Crear nueva cuenta</p>

  </div>
</div>
